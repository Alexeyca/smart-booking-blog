# Site settings
title: GoChatTravel Blog
description: >-
  Book hotels, flights, tours, and trains directly in WhatsApp, Telegram, 
  Facebook Messenger, WeChat, or Instagram. No apps, no registrations, no redirects.
  AI-powered travel booking with instant confirmation.
baseurl: ""
url: "https://alexeyca.github.io"
github_username: Alexeyca
lang: en
timezone: UTC

# Author
author: GoChatTravel Team
email: info@gochattravel.com

# Social & SEO
twitter:
  username: gochattravel
  card: summary_large_image

social:
  name: GoChatTravel
  links:
    - https://github.com/Alexeyca
    - https://www.gochattravel.com

# Logo for structured data
logo: /assets/images/logo.png

# Webmaster verifications
webmaster_verifications:
  google: # Add your Google verification code here

# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Feed settings
feed:
  path: feed.xml

# Exclude from processing
exclude:
  - .idea/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
